<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fafafa"/><stop offset="100%" stop-color="#f0f0f0"/></linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg2)"/>
  
  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">Coefficient of Thermal Expansion: Glass Types for Microscopy</text>
  <text x="400" y="60" text-anchor="middle" font-size="13" fill="#666">Linear CTE (×10⁻⁶ /°C) — lower is better for thermal stability</text>
  
  <!-- Bar chart area -->
  <text x="90" y="464" text-anchor="end" font-size="12" fill="#555">0</text>
  <text x="90" y="374" text-anchor="end" font-size="12" fill="#555">2</text>
  <text x="90" y="284" text-anchor="end" font-size="12" fill="#555">4</text>
  <text x="90" y="194" text-anchor="end" font-size="12" fill="#555">6</text>
  <text x="90" y="104" text-anchor="end" font-size="12" fill="#555">8</text>
  <text x="50" y="280" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90,50,280)">CTE (×10⁻⁶ /°C)</text>
  
  <!-- Y axis -->
  <line x1="100" y1="90" x2="100" y2="460" stroke="#ccc" stroke-width="1"/>
  <!-- Baseline -->
  <line x1="95" y1="460" x2="740" y2="460" stroke="#999" stroke-width="1"/>
  
  <!-- Grid -->
  <g stroke="#eee" stroke-width="0.5">
    <line x1="100" y1="370" x2="740" y2="370"/>
    <line x1="100" y1="280" x2="740" y2="280"/>
    <line x1="100" y1="190" x2="740" y2="190"/>
    <line x1="100" y1="100" x2="740" y2="100"/>
  </g>
  
  <!-- Bar: Fused Quartz (CTE=0.55, height~10) -->
  <rect x="130" y="450" width="100" height="10" fill="#c0392b" rx="2"/>
  <text x="180" y="440" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">0.55</text>
  <text x="180" y="476" text-anchor="middle" font-size="13" fill="#333">Fused Quartz</text>
  
  <!-- Bar: Borosilicate (CTE=3.3, height~60) -->
  <rect x="270" y="400" width="100" height="60" fill="#e67e22" rx="2"/>
  <text x="320" y="390" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">3.3</text>
  <text x="320" y="476" text-anchor="middle" font-size="13" fill="#333">Borosilicate</text>
  
  <!-- Bar: Soda-lime (CTE=9.0, height~164) -->
  <rect x="410" y="296" width="100" height="164" fill="#3498db" rx="2"/>
  <text x="460" y="286" text-anchor="middle" font-size="13" font-weight="bold" fill="#3498db">9.0</text>
  <text x="460" y="476" text-anchor="middle" font-size="13" fill="#333">Soda-Lime</text>
  
  <!-- Bar: Aluminum (CTE=23, for reference) -->
  <rect x="550" y="40" width="100" height="420" fill="#95a5a6" rx="2"/>
  <text x="600" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#7f8c8d">~23</text>
  <text x="600" y="476" text-anchor="middle" font-size="13" fill="#555">Al Stage</text>
  <text x="600" y="490" text-anchor="middle" font-size="10" fill="#999">(for reference)</text>
  
  <!-- Annotation arrow -->
  <line x1="180" y1="430" x2="320" y2="430" stroke="#555" stroke-width="0.8" marker-end="url(#arrow)"/>
  <text x="250" y="424" text-anchor="middle" font-size="10" fill="#555">6× lower</text>
  
  <!-- 15× annotation -->
  <text x="140" y="360" font-size="10" fill="#c0392b">15× lower CTE</text>
  <text x="140" y="372" font-size="10" fill="#c0392b">than soda-lime</text>
  <line x1="155" y1="375" x2="155" y2="445" stroke="#c0392b" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="155" y1="445" x2="435" y2="445" stroke="#c0392b" stroke-width="0.5" stroke-dasharray="2,2"/>
  
  <!-- Defs for marker -->
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/></marker></defs>
  
  <text x="400" y="496" text-anchor="middle" font-size="9" fill="#999">(Original diagram © MUHWA Scientific — free to cite with attribution)</text>
</svg>
